name: Deploy to GitHub Pages

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Prefetch data
        run: node scripts/prefetch.mjs
        env:
          VITE_SHEET_CSV_URL: ${{ secrets.VITE_SHEET_CSV_URL }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}
          VITE_WSP_NUMBER: ${{ secrets.VITE_WSP_NUMBER }}

      - name: Build
        run: yarn build:ci
        env:
          VITE_WSP_NUMBER: ${{ secrets.VITE_WSP_NUMBER }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
